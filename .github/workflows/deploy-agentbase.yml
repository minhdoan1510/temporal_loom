name: Deploy to AgentBase

# Auto-build the all-in-one image (app + MCP + MySQL + Qdrant) and roll it out to
# the GreenNode AgentBase runtime on every push to main.
on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "mcp/**"
      - "ui/web/**"
      - "migrations/**"
      - "config/config.agentbase.yaml.tmpl"
      - "deploy/agentbase/**"
      - "Dockerfile.agentbase"
      - ".github/workflows/deploy-agentbase.yml"
  workflow_dispatch: {} # allow manual runs

env:
  REGISTRY: vcr.vngcloud.vn
  VCR_REPO: "111480-abp111767" # registry project (not secret — appears in image URLs)
  IMAGE_NAME: lending-claw

jobs:
  build-and-push:
    runs-on: ubuntu-latest # amd64 runner → native build, no emulation
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to vCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.VCR_USERNAME }}
          password: ${{ secrets.VCR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agentbase
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.VCR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.VCR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Roll out new version on AgentBase
        env:
          # IAM service-account credentials (client_credentials OAuth flow).
          TOKEN_URL: https://iam.api.vngcloud.vn/accounts-api/v2/auth/token
          API: https://agentbase.api.vngcloud.vn/runtime
          CLIENT_ID: ${{ secrets.AGENTBASE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AGENTBASE_CLIENT_SECRET }}
          RUNTIME_ID: ${{ secrets.AGENTBASE_RUNTIME_ID }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.VCR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # App env vars injected into the runtime (kept as repo/Actions secrets).
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          set -euo pipefail

          # 1) Exchange service-account ClientID/Secret for a bearer access token.
          echo "Requesting access token…"
          TOKEN=$(curl -sS -u "${CLIENT_ID}:${CLIENT_SECRET}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${TOKEN_URL}" | jq -r '.access_token // .data.accessToken // empty')
          [ -n "$TOKEN" ] || { echo "Failed to obtain access token"; exit 1; }

          # 2) Build the environmentVariables object from the secrets that are set.
          #    (Secret env values are not returned by the API, so we re-supply them.)
          ENV_JSON=$(jq -n '{}')
          add() { [ -n "${2:-}" ] && ENV_JSON=$(jq --arg k "$1" --arg v "$2" '. + {($k):$v}' <<<"$ENV_JSON") || true; }
          add MYSQL_PASSWORD "$MYSQL_PASSWORD"
          add JWT_SECRET     "$JWT_SECRET"
          add ENCRYPTION_KEY "$ENCRYPTION_KEY"
          add MCP_AUTH_TOKEN "$MCP_AUTH_TOKEN"
          add LLM_API_KEY    "$LLM_API_KEY"

          # Carry over the latest version's config (flavor, autoscaling, imageAuth,
          # network) and only swap the image + env.
          curl -sS "${API}/agent-runtimes/${RUNTIME_ID}/versions?page=1&size=100" \
            -H "Authorization: Bearer ${TOKEN}" > /tmp/versions.json
          PAYLOAD=$(jq -n \
            --arg img "$IMAGE" \
            --argjson env "$ENV_JSON" \
            --slurpfile v /tmp/versions.json \
            '($v[0].listData // [] | max_by(.version)) as $cur
             | {
                 imageUrl: $img,
                 environmentVariables: $env,
                 flavorId: ($cur.flavorId // "runtime-s2-general-4x8"),
                 autoscaling: ($cur.autoscaling // {minReplicas:1,maxReplicas:1,cpuUtilization:70,memoryUtilization:70}),
                 imageAuth: ($cur.imageAuth // {enabled:true, useAgentBaseRegistryCredentials:true}),
                 networkConfig: ($cur.networkConfig // {mode:"PUBLIC"})
               }')

          # 3) Create a new runtime version pointing at the freshly pushed image.
          echo "Creating new version for ${RUNTIME_ID} -> ${IMAGE}"
          HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST "${API}/agent-runtimes/${RUNTIME_ID}/versions" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "HTTP $HTTP"; cat /tmp/resp.json || true
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || { echo "Rollout failed"; exit 1; }

          # 4) Poll until ACTIVE.
          echo "Waiting for runtime to become ACTIVE…"
          for _ in $(seq 1 60); do
            STATUS=$(curl -sS "${API}/agent-runtimes/${RUNTIME_ID}" \
              -H "Authorization: Bearer ${TOKEN}" | jq -r '.status // .data.status // "UNKNOWN"')
            echo "  status=$STATUS"
            case "$STATUS" in
              ACTIVE) echo "Deployed."; exit 0 ;;
              FAILED|ERROR) echo "Deployment failed."; exit 1 ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for ACTIVE"; exit 1
