name: Deploy to AgentBase

# Auto-build the all-in-one image (app + MCP + MySQL + Qdrant) and roll it out to
# the GreenNode AgentBase runtime on every push to main.
on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "mcp/**"
      - "ui/web/**"
      - "migrations/**"
      - "config/config.agentbase.yaml.tmpl"
      - "deploy/agentbase/**"
      - "Dockerfile.agentbase"
      - ".github/workflows/deploy-agentbase.yml"
  workflow_dispatch: {} # allow manual runs

env:
  REGISTRY: vcr.vngcloud.vn
  VCR_REPO: "111480-abp111767" # registry project (not secret — appears in image URLs)
  IMAGE_NAME: lending-claw

jobs:
  build-and-push:
    runs-on: ubuntu-latest # amd64 runner → native build, no emulation
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to vCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.VCR_USERNAME }}
          password: ${{ secrets.VCR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agentbase
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.VCR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.VCR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Roll out new version on AgentBase
        env:
          # IAM service-account credentials (client_credentials OAuth flow).
          TOKEN_URL: https://iam.api.vngcloud.vn/accounts-api/v2/auth/token
          API: https://agentbase.api.vngcloud.vn/runtime
          CLIENT_ID: ${{ secrets.AGENTBASE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AGENTBASE_CLIENT_SECRET }}
          RUNTIME_ID: ${{ secrets.AGENTBASE_RUNTIME_ID }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.VCR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # vCR pull credentials — supplied to AgentBase as imageAuth so the runtime
          # can pull the image from the private registry.
          VCR_USERNAME: ${{ secrets.VCR_USERNAME }}
          VCR_PASSWORD: ${{ secrets.VCR_PASSWORD }}
          # App env vars injected into the runtime (kept as repo/Actions secrets).
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          set -euo pipefail

          # Safe debug logging helper. Secrets are masked by Actions, but we also
          # avoid printing their values directly; only metadata (lengths, keys, …).
          log() { echo "[debug] $*"; }

          echo "::group::Step 0 — Preflight checks"
          log "TOKEN_URL=${TOKEN_URL}"
          log "API=${API}"
          log "IMAGE=${IMAGE}"
          log "RUNTIME_ID set? $([ -n "${RUNTIME_ID:-}" ] && echo yes || echo NO)"
          log "CLIENT_ID set? $([ -n "${CLIENT_ID:-}" ] && echo yes || echo NO)"
          log "CLIENT_SECRET set? $([ -n "${CLIENT_SECRET:-}" ] && echo yes || echo NO)"
          log "curl version: $(curl --version | head -n1)"
          log "jq version: $(jq --version)"
          echo "::endgroup::"

          echo "::group::Step 1 — Exchange credentials for access token"
          # 1) Exchange service-account ClientID/Secret for a bearer access token.
          log "POST ${TOKEN_URL} (grant_type=client_credentials)"
          TOKEN_HTTP=$(curl -sS -o /tmp/token.json -w '%{http_code}' \
            -u "${CLIENT_ID}:${CLIENT_SECRET}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${TOKEN_URL}")
          log "token endpoint HTTP=${TOKEN_HTTP}"
          TOKEN=$(jq -r '.access_token // .data.accessToken // empty' /tmp/token.json)
          if [ -z "$TOKEN" ]; then
            log "response keys: $(jq -r 'keys? // [] | join(",")' /tmp/token.json 2>/dev/null || echo '<non-json>')"
            echo "Failed to obtain access token"; exit 1
          fi
          log "token acquired (length=${#TOKEN})"
          # Keep the raw token out of the logs even if Actions masking misses it.
          echo "::add-mask::${TOKEN}"
          echo "::endgroup::"

          echo "::group::Step 1.5 — Inspect token identity & scopes"
          # Decode the JWT payload (2nd segment) to reveal WHO this token is and what
          # it's allowed to do. Only non-sensitive claims are printed — this is the
          # key signal for a 403 IAM_PERMISSION_DENIED (read vs write scope).
          b64url_decode() { local d="${1//-/+}"; d="${d//_//}"; case $(( ${#d} % 4 )) in 2) d="${d}==";; 3) d="${d}=";; esac; printf '%s' "$d" | base64 -d 2>/dev/null; }
          JWT_PAYLOAD=$(printf '%s' "$TOKEN" | cut -d. -f2)
          CLAIMS=$(b64url_decode "$JWT_PAYLOAD")
          if printf '%s' "$CLAIMS" | jq -e . >/dev/null 2>&1; then
            log "token claims (identity/scope only):"
            printf '%s' "$CLAIMS" | jq '{
              sub, client_id, azp, aud, iss,
              scope, scopes, roles, authorities, permissions,
              account_id, accountId, projectId, project_id, tenant, org,
              exp, iat
            } | with_entries(select(.value != null))'
          else
            log "access token is not a decodable JWT (opaque token) — cannot inspect scopes client-side"
          fi
          echo "::endgroup::"

          echo "::group::Step 2 — Build payload (env + carried-over config)"
          # 2) Build the environmentVariables object from the secrets that are set.
          #    (Secret env values are not returned by the API, so we re-supply them.)
          ENV_JSON=$(jq -n '{}')
          add() { [ -n "${2:-}" ] && ENV_JSON=$(jq --arg k "$1" --arg v "$2" '. + {($k):$v}' <<<"$ENV_JSON") || true; }
          add MYSQL_PASSWORD "$MYSQL_PASSWORD"
          add JWT_SECRET     "$JWT_SECRET"
          add ENCRYPTION_KEY "$ENCRYPTION_KEY"
          add MCP_AUTH_TOKEN "$MCP_AUTH_TOKEN"
          add LLM_API_KEY    "$LLM_API_KEY"
          log "environmentVariables keys: $(jq -r 'keys | join(",")' <<<"$ENV_JSON")"

          # Carry over the latest version's config (flavor, autoscaling, imageAuth,
          # network) and only swap the image + env.
          log "GET ${API}/agent-runtimes/${RUNTIME_ID}/versions"
          VERS_HTTP=$(curl -sS -o /tmp/versions.json -w '%{http_code}' \
            "${API}/agent-runtimes/${RUNTIME_ID}/versions?page=1&size=100" \
            -H "Authorization: Bearer ${TOKEN}")
          log "versions endpoint HTTP=${VERS_HTTP}"
          if ! { [ "$VERS_HTTP" -ge 200 ] && [ "$VERS_HTTP" -lt 300 ]; }; then
            log "GET versions failed — response body:"
            cat /tmp/versions.json || true
            echo
          fi
          log "version count: $(jq -r '(.listData // []) | length' /tmp/versions.json 2>/dev/null || echo '?')"
          log "latest version: $(jq -r '((.listData // []) | max_by(.version) | .version) // "none"' /tmp/versions.json 2>/dev/null || echo '?')"

          # Build imageAuth for the private vCR registry. The runtime API expects
          # {enabled, username, password}; prefer the vCR credentials, falling back
          # to whatever the current version already had.
          if [ -n "${VCR_USERNAME:-}" ] && [ -n "${VCR_PASSWORD:-}" ]; then
            IMAGE_AUTH=$(jq -n --arg u "$VCR_USERNAME" --arg p "$VCR_PASSWORD" \
              '{enabled:true, username:$u, password:$p}')
            log "imageAuth: explicit vCR credentials (username=${VCR_USERNAME})"
          else
            IMAGE_AUTH=$(jq -r '((.listData // []) | max_by(.version) | .imageAuth) // {enabled:true}' /tmp/versions.json)
            log "imageAuth: carried over from latest version"
          fi

          # Carry over flavor/autoscaling/networkConfig from the latest version and
          # only swap the image, env, and imageAuth. PATCH /agent-runtimes/{id}
          # creates a new version and points the DEFAULT endpoint at it.
          PAYLOAD=$(jq -n \
            --arg img "$IMAGE" \
            --argjson env "$ENV_JSON" \
            --argjson imageAuth "$IMAGE_AUTH" \
            --slurpfile v /tmp/versions.json \
            '($v[0].listData // [] | max_by(.version)) as $cur
             | {
                 imageUrl: $img,
                 description: ($cur.description // ""),
                 command: [],
                 args: [],
                 environmentVariables: $env,
                 flavorId: ($cur.flavorId // "runtime-s2-general-4x8"),
                 autoscaling: ($cur.autoscaling // {minReplicas:1,maxReplicas:1,cpuUtilization:70,memoryUtilization:70}),
                 imageAuth: $imageAuth
               }
             # networkConfig is optional — only include it when the current version has one.
             + (if ($cur.networkConfig // null) != null then {networkConfig: $cur.networkConfig} else {} end)')
          # Print payload with env + imageAuth password redacted so we can verify the shape safely.
          log "payload (secrets redacted):"
          jq '(.environmentVariables |= (with_entries(.value = "***")))
              | (if .imageAuth.password then .imageAuth.password = "***" else . end)' <<<"$PAYLOAD"
          echo "::endgroup::"

          echo "::group::Step 3 — Deploy new runtime version (PATCH)"
          # 3) Update the runtime to point at the freshly pushed image. Per the
          #    AgentBase runtime API, PATCH /agent-runtimes/{id} creates a new
          #    version and auto-updates the DEFAULT endpoint.
          log "PATCH ${API}/agent-runtimes/${RUNTIME_ID} -> ${IMAGE}"
          HTTP=$(curl -sS -o /tmp/resp.json -D /tmp/resp.headers -w '%{http_code}' \
            -X PATCH "${API}/agent-runtimes/${RUNTIME_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          log "deploy HTTP=${HTTP}"
          log "response body:"
          cat /tmp/resp.json || true
          echo
          if ! { [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; }; then
            log "response headers (for trace/correlation IDs):"
            cat /tmp/resp.headers || true
            echo "::endgroup::"
            echo "Rollout failed"; exit 1
          fi
          echo "::endgroup::"

          echo "::group::Step 3.5 — Resolve the freshly created version number"
          # The PATCH above creates a NEW runtime version. Capture its number so we
          # can point a brand-new endpoint at exactly this version. Prefer the value
          # from the PATCH response; fall back to the max version from the list API.
          NEW_VERSION=$(jq -r '.version // .data.version // empty' /tmp/resp.json 2>/dev/null || true)
          if [ -z "${NEW_VERSION:-}" ]; then
            log "PATCH response had no .version — querying versions list"
            curl -sS -o /tmp/versions.json \
              "${API}/agent-runtimes/${RUNTIME_ID}/versions?page=1&size=100" \
              -H "Authorization: Bearer ${TOKEN}" || true
            NEW_VERSION=$(jq -r '((.listData // []) | max_by(.version) | .version) // empty' /tmp/versions.json 2>/dev/null || true)
          fi
          if [ -z "${NEW_VERSION:-}" ]; then
            echo "Could not determine the new version number"; echo "::endgroup::"; exit 1
          fi
          log "new version = ${NEW_VERSION}"
          echo "::endgroup::"

          echo "::group::Step 4 — Create a NEW endpoint for this version"
          # Each deploy gets its own endpoint named after the short commit SHA, so
          # previous endpoints/versions keep serving (no in-place endpoint update).
          # Endpoint names must be lowercase + hyphens: dep-<short-sha>.
          SHORT_SHA=$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)
          EP_NAME="dep-${SHORT_SHA}"
          log "endpoint name = ${EP_NAME} -> version ${NEW_VERSION}"
          EP_PAYLOAD=$(jq -n --arg n "$EP_NAME" --argjson v "$NEW_VERSION" '{name:$n, version:$v}')
          EP_HTTP=$(curl -sS -o /tmp/ep.json -w '%{http_code}' \
            -X POST "${API}/agent-runtimes/${RUNTIME_ID}/endpoints" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$EP_PAYLOAD")
          log "create endpoint HTTP=${EP_HTTP}"
          if { [ "$EP_HTTP" -ge 200 ] && [ "$EP_HTTP" -lt 300 ]; }; then
            EP_ID=$(jq -r '.id // .data.id // empty' /tmp/ep.json 2>/dev/null || true)
            log "created endpoint id=${EP_ID:-?}"
          else
            # Re-running the same commit hits a name conflict. In that case, find the
            # existing endpoint by name and repoint it to the new version instead.
            log "create failed (likely name already exists) — response body:"
            cat /tmp/ep.json || true; echo
            curl -sS -o /tmp/eplist.json \
              "${API}/agent-runtimes/${RUNTIME_ID}/endpoints?page=1&size=100" \
              -H "Authorization: Bearer ${TOKEN}" || true
            EP_ID=$(jq -r --arg n "$EP_NAME" '((.listData // []) | map(select(.name==$n)) | .[0].id) // empty' /tmp/eplist.json 2>/dev/null || true)
            if [ -z "${EP_ID:-}" ]; then
              echo "Endpoint create failed and no existing endpoint named ${EP_NAME} found"; echo "::endgroup::"; exit 1
            fi
            log "endpoint ${EP_NAME} (${EP_ID}) exists — PATCH to version ${NEW_VERSION}"
            UP_HTTP=$(curl -sS -o /tmp/ep.json -w '%{http_code}' \
              -X PATCH "${API}/agent-runtimes/${RUNTIME_ID}/endpoints/${EP_ID}?version=${NEW_VERSION}" \
              -H "Authorization: Bearer ${TOKEN}")
            log "update endpoint HTTP=${UP_HTTP}"
            if ! { [ "$UP_HTTP" -ge 200 ] && [ "$UP_HTTP" -lt 300 ]; }; then
              cat /tmp/ep.json || true; echo
              echo "Failed to update existing endpoint"; echo "::endgroup::"; exit 1
            fi
          fi
          echo "::endgroup::"

          echo "::group::Step 5 — Wait for the new endpoint to become ACTIVE"
          # Poll the endpoint (not the runtime) so we track THIS deploy's rollout.
          # Endpoint statuses mirror runtime ones: CREATING/UPDATING -> ACTIVE | ERROR.
          for i in $(seq 1 60); do
            curl -sS -o /tmp/eplist.json \
              "${API}/agent-runtimes/${RUNTIME_ID}/endpoints?page=1&size=100" \
              -H "Authorization: Bearer ${TOKEN}" || true
            EP_JSON=$(jq -c --arg n "$EP_NAME" '((.listData // []) | map(select(.name==$n)) | .[0]) // {}' /tmp/eplist.json 2>/dev/null || echo '{}')
            STATUS=$(jq -r '.status // "UNKNOWN"' <<<"$EP_JSON")
            EP_URL=$(jq -r '.url // empty' <<<"$EP_JSON")
            log "poll ${i}/60 endpoint=${EP_NAME} status=${STATUS}"
            case "$STATUS" in
              ACTIVE)
                echo "Deployed endpoint ${EP_NAME} (version ${NEW_VERSION})."
                [ -n "$EP_URL" ] && echo "Endpoint URL: ${EP_URL}"
                echo "::endgroup::"; exit 0 ;;
              ERROR|FAILED|DELETING)
                log "endpoint detail: ${EP_JSON}"
                echo "Endpoint rollout failed."; echo "::endgroup::"; exit 1 ;;
            esac
            sleep 10
          done
          echo "::endgroup::"
          echo "Timed out waiting for endpoint ${EP_NAME} to become ACTIVE"; exit 1
