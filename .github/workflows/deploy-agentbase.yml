name: Deploy to AgentBase

# Auto-build the all-in-one image (app + MCP + MySQL + Qdrant) and roll it out to
# the GreenNode AgentBase runtime on every push to main.
on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "mcp/**"
      - "ui/web/**"
      - "migrations/**"
      - "config/config.agentbase.yaml.tmpl"
      - "deploy/agentbase/**"
      - "Dockerfile.agentbase"
      - ".github/workflows/deploy-agentbase.yml"
  workflow_dispatch: {} # allow manual runs

env:
  REGISTRY: vcr.vngcloud.vn
  VCR_REPO: "111480-abp111767" # registry project (not secret — appears in image URLs)
  IMAGE_NAME: lending-claw

jobs:
  build-and-push:
    runs-on: ubuntu-latest # amd64 runner → native build, no emulation
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to vCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.VCR_USERNAME }}
          password: ${{ secrets.VCR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agentbase
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.VCR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.VCR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Roll out new version on AgentBase
        env:
          # IAM service-account credentials (client_credentials OAuth flow).
          TOKEN_URL: https://iam.api.vngcloud.vn/accounts-api/v2/auth/token
          API: https://agentbase.api.vngcloud.vn/runtime
          CLIENT_ID: ${{ secrets.AGENTBASE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AGENTBASE_CLIENT_SECRET }}
          RUNTIME_ID: ${{ secrets.AGENTBASE_RUNTIME_ID }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.VCR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # App env vars injected into the runtime (kept as repo/Actions secrets).
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          set -euo pipefail

          # Safe debug logging helper. Secrets are masked by Actions, but we also
          # avoid printing their values directly; only metadata (lengths, keys, …).
          log() { echo "[debug] $*"; }

          echo "::group::Step 0 — Preflight checks"
          log "TOKEN_URL=${TOKEN_URL}"
          log "API=${API}"
          log "IMAGE=${IMAGE}"
          log "RUNTIME_ID set? $([ -n "${RUNTIME_ID:-}" ] && echo yes || echo NO)"
          log "CLIENT_ID set? $([ -n "${CLIENT_ID:-}" ] && echo yes || echo NO)"
          log "CLIENT_SECRET set? $([ -n "${CLIENT_SECRET:-}" ] && echo yes || echo NO)"
          log "curl version: $(curl --version | head -n1)"
          log "jq version: $(jq --version)"
          echo "::endgroup::"

          echo "::group::Step 1 — Exchange credentials for access token"
          # 1) Exchange service-account ClientID/Secret for a bearer access token.
          log "POST ${TOKEN_URL} (grant_type=client_credentials)"
          TOKEN_HTTP=$(curl -sS -o /tmp/token.json -w '%{http_code}' \
            -u "${CLIENT_ID}:${CLIENT_SECRET}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            "${TOKEN_URL}")
          log "token endpoint HTTP=${TOKEN_HTTP}"
          TOKEN=$(jq -r '.access_token // .data.accessToken // empty' /tmp/token.json)
          if [ -z "$TOKEN" ]; then
            log "response keys: $(jq -r 'keys? // [] | join(",")' /tmp/token.json 2>/dev/null || echo '<non-json>')"
            echo "Failed to obtain access token"; exit 1
          fi
          log "token acquired (length=${#TOKEN})"
          # Keep the raw token out of the logs even if Actions masking misses it.
          echo "::add-mask::${TOKEN}"
          echo "::endgroup::"

          echo "::group::Step 1.5 — Inspect token identity & scopes"
          # Decode the JWT payload (2nd segment) to reveal WHO this token is and what
          # it's allowed to do. Only non-sensitive claims are printed — this is the
          # key signal for a 403 IAM_PERMISSION_DENIED (read vs write scope).
          b64url_decode() { local d="${1//-/+}"; d="${d//_//}"; case $(( ${#d} % 4 )) in 2) d="${d}==";; 3) d="${d}=";; esac; printf '%s' "$d" | base64 -d 2>/dev/null; }
          JWT_PAYLOAD=$(printf '%s' "$TOKEN" | cut -d. -f2)
          CLAIMS=$(b64url_decode "$JWT_PAYLOAD")
          if printf '%s' "$CLAIMS" | jq -e . >/dev/null 2>&1; then
            log "token claims (identity/scope only):"
            printf '%s' "$CLAIMS" | jq '{
              sub, client_id, azp, aud, iss,
              scope, scopes, roles, authorities, permissions,
              account_id, accountId, projectId, project_id, tenant, org,
              exp, iat
            } | with_entries(select(.value != null))'
          else
            log "access token is not a decodable JWT (opaque token) — cannot inspect scopes client-side"
          fi
          echo "::endgroup::"

          echo "::group::Step 2 — Build payload (env + carried-over config)"
          # 2) Build the environmentVariables object from the secrets that are set.
          #    (Secret env values are not returned by the API, so we re-supply them.)
          ENV_JSON=$(jq -n '{}')
          add() { [ -n "${2:-}" ] && ENV_JSON=$(jq --arg k "$1" --arg v "$2" '. + {($k):$v}' <<<"$ENV_JSON") || true; }
          add MYSQL_PASSWORD "$MYSQL_PASSWORD"
          add JWT_SECRET     "$JWT_SECRET"
          add ENCRYPTION_KEY "$ENCRYPTION_KEY"
          add MCP_AUTH_TOKEN "$MCP_AUTH_TOKEN"
          add LLM_API_KEY    "$LLM_API_KEY"
          log "environmentVariables keys: $(jq -r 'keys | join(",")' <<<"$ENV_JSON")"

          # Carry over the latest version's config (flavor, autoscaling, imageAuth,
          # network) and only swap the image + env.
          log "GET ${API}/agent-runtimes/${RUNTIME_ID}/versions"
          VERS_HTTP=$(curl -sS -o /tmp/versions.json -w '%{http_code}' \
            "${API}/agent-runtimes/${RUNTIME_ID}/versions?page=1&size=100" \
            -H "Authorization: Bearer ${TOKEN}")
          log "versions endpoint HTTP=${VERS_HTTP}"
          if ! { [ "$VERS_HTTP" -ge 200 ] && [ "$VERS_HTTP" -lt 300 ]; }; then
            log "GET versions failed — response body:"
            cat /tmp/versions.json || true
            echo
          fi
          log "version count: $(jq -r '(.listData // []) | length' /tmp/versions.json 2>/dev/null || echo '?')"
          log "latest version: $(jq -r '((.listData // []) | max_by(.version) | .version) // "none"' /tmp/versions.json 2>/dev/null || echo '?')"
          PAYLOAD=$(jq -n \
            --arg img "$IMAGE" \
            --argjson env "$ENV_JSON" \
            --slurpfile v /tmp/versions.json \
            '($v[0].listData // [] | max_by(.version)) as $cur
             | {
                 imageUrl: $img,
                 environmentVariables: $env,
                 flavorId: ($cur.flavorId // "runtime-s2-general-4x8"),
                 autoscaling: ($cur.autoscaling // {minReplicas:1,maxReplicas:1,cpuUtilization:70,memoryUtilization:70}),
                 imageAuth: ($cur.imageAuth // {enabled:true, useAgentBaseRegistryCredentials:true}),
                 networkConfig: ($cur.networkConfig // {mode:"PUBLIC"})
               }')
          # Print payload with env values redacted so we can verify the shape safely.
          log "payload (env redacted):"
          jq '.environmentVariables |= (with_entries(.value = "***"))' <<<"$PAYLOAD"
          echo "::endgroup::"

          echo "::group::Step 3 — Create new runtime version"
          # 3) Create a new runtime version pointing at the freshly pushed image.
          log "POST ${API}/agent-runtimes/${RUNTIME_ID}/versions -> ${IMAGE}"
          HTTP=$(curl -sS -o /tmp/resp.json -D /tmp/resp.headers -w '%{http_code}' \
            -X POST "${API}/agent-runtimes/${RUNTIME_ID}/versions" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          log "create version HTTP=${HTTP}"
          log "response body:"
          cat /tmp/resp.json || true
          echo
          if ! { [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; }; then
            log "response headers (for trace/correlation IDs):"
            cat /tmp/resp.headers || true
            echo "::endgroup::"
            echo "Rollout failed"; exit 1
          fi
          echo "::endgroup::"

          echo "::group::Step 4 — Wait for runtime to become ACTIVE"
          # 4) Poll until ACTIVE.
          for i in $(seq 1 60); do
            STATUS=$(curl -sS "${API}/agent-runtimes/${RUNTIME_ID}" \
              -H "Authorization: Bearer ${TOKEN}" | jq -r '.status // .data.status // "UNKNOWN"')
            log "poll ${i}/60 status=${STATUS}"
            case "$STATUS" in
              ACTIVE) echo "Deployed."; echo "::endgroup::"; exit 0 ;;
              FAILED|ERROR) echo "Deployment failed."; echo "::endgroup::"; exit 1 ;;
            esac
            sleep 10
          done
          echo "::endgroup::"
          echo "Timed out waiting for ACTIVE"; exit 1
